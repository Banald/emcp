use_default_settings:
  engines:
    keep_only:
      - google
      - brave
      - bing
      - qwant
      - startpage

# --- Outgoing proxy rotation (Echo) ---
# The SEARXNG_OUTGOING_PROXIES env var is expanded by
# infra/searxng/entrypoint.sh at container start. Empty var → this
# marker line is removed and SearXNG makes direct requests. Non-empty
# → the marker is replaced with an `outgoing.proxies.all://` block,
# rotating engine scrapers across every URL in the list (SearXNG
# picks one per request). Keep the marker unchanged; the entrypoint
# matches it literally.
# SEARXNG_OUTGOING_PROXIES_MARKER

general:
  instance_name: "Echo SearXNG"

search:
  safe_search: 0
  default_lang: "sv"
  formats:
    - html
    - json

server:
  # The literal "ultrasecretkey" placeholder is replaced at container start
  # by SearXNG's own entrypoint using the $SEARXNG_SECRET env var. That value
  # comes from the SEARXNG_SECRET setting in .env (see .env.example). Do not
  # commit a real secret here.
  secret_key: "ultrasecretkey"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
    language: sv

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    region: sv-SE

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    region: sv-SE

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false
    region: sv-SE

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false
    language: sv
