use_default_settings:
  engines:
    keep_only:
      - google
      - brave
      - bing
      - qwant
      - startpage

general:
  instance_name: "Echo SearXNG"

search:
  safe_search: 0
  default_lang: "sv"
  formats:
    - html
    - json

server:
  # The literal "ultrasecretkey" placeholder is replaced at container start
  # by SearXNG's own entrypoint using the $SEARXNG_SECRET env var. That value
  # comes from the SEARXNG_SECRET setting in .env (see .env.example). Do not
  # commit a real secret here.
  secret_key: "ultrasecretkey"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
    language: sv

  - name: brave
    engine: brave
    shortcut: br
    disabled: false
    language: sv

  - name: bing
    engine: bing
    shortcut: bi
    disabled: false
    language: sv

  - name: qwant
    engine: qwant
    shortcut: qw
    disabled: false
    language: sv

  - name: startpage
    engine: startpage
    shortcut: sp
    disabled: false
    language: sv
