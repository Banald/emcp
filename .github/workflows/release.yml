name: Release

on:
  push:
    tags: ['v*']

env:
  # Run JavaScript actions (checkout, setup-node, upload-artifact, ...) on
  # Node.js 24 instead of the deprecated Node.js 20. GitHub will force this
  # default in June 2026; opting in now matches our runtime pin.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - id: check
        name: Validate tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  ci:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: mcp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mcp"
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Verify package signatures
        run: npm audit signatures
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Install podman (python-execute sandbox runtime)
        # See docs/SECURITY.md Rule 15. The unit gate exercises real
        # podman + the built sandbox image so network/fs isolation is
        # validated end-to-end, not just argv shape.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends podman
          podman --version
      - name: Build python-sandbox image
        run: bash scripts/build-python-sandbox.sh
      - name: Test with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Migrations reversibility test
        env:
          NODE_ENV: test
          EMCP_PORT: '3000'
          EMCP_PUBLIC_HOST: localhost
          EMCP_ALLOWED_ORIGINS: http://localhost
          EMCP_DATABASE_URL: postgres://mcp:mcp@localhost:5432/mcp_test
          EMCP_REDIS_URL: redis://localhost:6379
          EMCP_API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
        run: |
          node src/db/migrate.ts up
          node src/db/migrate.ts down
          node src/db/migrate.ts up
          node src/db/migrate.ts status
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  integration:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          EMCP_PORT: '0'
          EMCP_PUBLIC_HOST: localhost
          EMCP_ALLOWED_ORIGINS: http://localhost
          EMCP_API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
          EMCP_DATABASE_URL: postgres://placeholder/placeholder
          EMCP_REDIS_URL: redis://placeholder

  docker:
    needs: [ci, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write     # push to ghcr.io
      id-token: write     # SLSA provenance keyless signing
      attestations: write # attach provenance to registry
    outputs:
      image: ${{ steps.image.outputs.name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Compute lowercased image name
        id: image
        # ghcr.io rejects uppercase characters in image paths, but GitHub
        # usernames and org names may contain them. Lowercase once, reuse.
        run: |
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/emcp" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.image.outputs.name }}
          # `latest=auto` (default) only promotes stable releases to `latest`
          # and skips prereleases. The major/minor guards do the same for
          # those roll-up tags — never point v1.2 at v1.2.3-rc1.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-
      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Install cosign
        # OWASP #13 — keyless image signing via the workflow's OIDC
        # identity. Installs only the cosign binary; no long-lived keys
        # ever live in the repo or as a secret.
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Sign the image with cosign
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          # Sign each tag that was pushed, all pointing at the same
          # digest. `--yes` skips the Fulcio confirmation prompt; the
          # signature is recorded in Rekor's public transparency log.
          # metadata-action emits tags newline-separated; pass via env
          # so bash word-splitting (on whitespace incl. newlines) iterates
          # correctly. Direct action-expression interpolation into the
          # `for` header collapsed newlines and broke the shell.
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done
      - name: Attest build provenance
        # attest-build-provenance needs a public repo or GHAS on the org.
        # User-owned private repos get a 400 with "Feature not available".
        # Auto-activates when visibility flips to public. The buildx step
        # above already writes in-toto provenance into the image manifest
        # via `provenance: mode=max` — this is the additional Sigstore-signed
        # attestation on top of that.
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  python-sandbox:
    # Build, push, and sign the python-sandbox image consumed by the
    # `python-execute` MCP tool at runtime. Independent of the eMCP image
    # (different Dockerfile, different lifecycle), so this job runs in
    # parallel with `docker`. The `release` job below pins both digests in
    # the GitHub Release notes.
    #
    # Why we publish this image rather than building it on every host:
    # operators get a deterministic, signed artifact (the cosign verify
    # incantation matches the eMCP image), and a fresh `install.sh` run can
    # `podman pull` it instead of waiting ~2 minutes for pip to resolve the
    # scientific stack on every install. Air-gapped hosts can still build
    # locally via `bash scripts/build-python-sandbox.sh`.
    needs: [ci, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image: ${{ steps.image.outputs.name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Compute lowercased image name
        id: image
        run: |
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/python-sandbox" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-
      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: ./infra/python-sandbox
          file: ./infra/python-sandbox/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=python-sandbox
          cache-to: type=gha,mode=max,scope=python-sandbox
          provenance: mode=max
          sbom: true
      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
      - name: Sign the image with cosign
        env:
          IMAGE: ${{ steps.image.outputs.name }}
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for tag in $TAGS; do
            cosign sign --yes "${tag}@${DIGEST}"
          done
      - name: Attest build provenance
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    # Creates a GitHub Release page with auto-generated notes. The release
    # artifacts are the two container images pushed by `docker` and
    # `python-sandbox` above — there is no tarball and no downloadable
    # binary, but the install.sh script attached below pulls both at run.
    needs: [docker, python-sandbox]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Stamp installer version
        # Rewrite the placeholder EMCP_INSTALLER_VERSION in scripts/install.sh
        # to the concrete tag. The scripts/install.test.sh smoke test asserts
        # this line's format, so changes here must stay compatible.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          sed -i "s|^EMCP_INSTALLER_VERSION=.*|EMCP_INSTALLER_VERSION=\"${TAG}\"|" scripts/install.sh
          grep '^EMCP_INSTALLER_VERSION=' scripts/install.sh
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          IMAGE: ${{ needs.docker.outputs.image }}
          DIGEST: ${{ needs.docker.outputs.digest }}
          SANDBOX_IMAGE: ${{ needs.python-sandbox.outputs.image }}
          SANDBOX_DIGEST: ${{ needs.python-sandbox.outputs.digest }}
        run: |
          VERSION="${TAG#v}"
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-.+'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<EOF
          ## Install with one command (no sudo)

          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${TAG}/install.sh | bash
          \`\`\`

          Runs as your unprivileged user against a rootless Docker
          daemon. The installer validates every rootless precondition
          (subuid range, linger, kernel), walks you through \`.env\`,
          pulls both released images (eMCP server and python-execute
          sandbox), and installs the \`emcp\` CLI at
          \`\$XDG_BIN_HOME/emcp\` (default \`\$HOME/.local/bin/emcp\`) for
          day-2 ops (\`emcp up\`, \`emcp logs\`, \`emcp key create …\`).

          See [README.md](https://github.com/${{ github.repository }}/blob/${TAG}/README.md) for details.

          ## Container image (eMCP server / worker)

          \`\`\`
          docker pull ${IMAGE}:${VERSION}
          \`\`\`

          Pinned by digest:

          \`\`\`
          ${IMAGE}@${DIGEST}
          \`\`\`

          ### Verify the signature (cosign keyless, OWASP #13)

          \`\`\`
          cosign verify ${IMAGE}@${DIGEST} \\
            --certificate-identity-regexp '^https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          \`\`\`

          ## Container image (\`python-execute\` sandbox)

          The \`python-execute\` MCP tool drives this image directly via
          podman (never via compose, never sharing the eMCP daemon). See
          \`docs/SECURITY.md\` Rule 15.

          \`\`\`
          podman pull ${SANDBOX_IMAGE}:${VERSION}
          \`\`\`

          Pinned by digest:

          \`\`\`
          ${SANDBOX_IMAGE}@${SANDBOX_DIGEST}
          \`\`\`

          ### Verify the signature (cosign keyless)

          \`\`\`
          cosign verify ${SANDBOX_IMAGE}@${SANDBOX_DIGEST} \\
            --certificate-identity-regexp '^https://github.com/${{ github.repository }}/\\.github/workflows/release\\.yml@' \\
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          \`\`\`

          ### SBOM + provenance

          SBOM and SLSA provenance attestations are attached to both
          image manifests. Inspect with:

          \`\`\`
          docker buildx imagetools inspect ${IMAGE}@${DIGEST} --format '{{ json .SBOM }}'
          docker buildx imagetools inspect ${IMAGE}@${DIGEST} --format '{{ json .Provenance }}'
          docker buildx imagetools inspect ${SANDBOX_IMAGE}@${SANDBOX_DIGEST} --format '{{ json .SBOM }}'
          docker buildx imagetools inspect ${SANDBOX_IMAGE}@${SANDBOX_DIGEST} --format '{{ json .Provenance }}'
          \`\`\`
          EOF
          gh release create "$TAG" \
            --title "eMCP $TAG" \
            --notes-file "$NOTES_FILE" \
            --generate-notes \
            $PRERELEASE_FLAG
      - name: Attach installer + CLI as release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" scripts/install.sh scripts/emcp --clobber
