name: Release

on:
  push:
    tags: ['v*']

env:
  # Run JavaScript actions (checkout, setup-node, upload-artifact, ...) on
  # Node.js 24 instead of the deprecated Node.js 20. GitHub will force this
  # default in June 2026; opting in now matches our runtime pin.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - id: check
        name: Validate tag matches package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

  ci:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: mcp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mcp"
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Verify package signatures
        run: npm audit signatures
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Migrations reversibility test
        env:
          NODE_ENV: test
          PORT: '3000'
          PUBLIC_HOST: localhost
          ALLOWED_ORIGINS: http://localhost
          DATABASE_URL: postgres://mcp:mcp@localhost:5432/mcp_test
          REDIS_URL: redis://localhost:6379
          API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
        run: |
          node src/db/migrate.ts up
          node src/db/migrate.ts down
          node src/db/migrate.ts up
          node src/db/migrate.ts status
      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  integration:
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          PORT: '0'
          PUBLIC_HOST: localhost
          ALLOWED_ORIGINS: http://localhost
          API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
          DATABASE_URL: postgres://placeholder/placeholder
          REDIS_URL: redis://placeholder

  docker:
    needs: [ci, integration]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write     # push to ghcr.io
      id-token: write     # SLSA provenance keyless signing
      attestations: write # attach provenance to registry
    outputs:
      image: ${{ steps.image.outputs.name }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Compute lowercased image name
        id: image
        # ghcr.io rejects uppercase characters in image paths, but GitHub
        # usernames and org names may contain them. Lowercase once, reuse.
        run: |
          owner=$(printf '%s' "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "name=ghcr.io/${owner}/echo" >> "$GITHUB_OUTPUT"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Log in to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ steps.image.outputs.name }}
          # `latest=auto` (default) only promotes stable releases to `latest`
          # and skips prereleases. The major/minor guards do the same for
          # those roll-up tags — never point v1.2 at v1.2.3-rc1.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ !contains(github.ref_name, '-') }}
            type=semver,pattern={{major}},enable=${{ !contains(github.ref_name, '-') }}
            type=sha,prefix=sha-
      - name: Build and push
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true
      - name: Attest build provenance
        # attest-build-provenance needs a public repo or GHAS on the org.
        # User-owned private repos get a 400 with "Feature not available".
        # Auto-activates when visibility flips to public. The buildx step
        # above already writes in-toto provenance into the image manifest
        # via `provenance: mode=max` — this is the additional Sigstore-signed
        # attestation on top of that.
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    # Creates a GitHub Release page with auto-generated notes. The release
    # artifact is the container image pushed by the `docker` job above —
    # there is no tarball and no downloadable binary.
    needs: [docker]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Stamp installer version
        # Rewrite the placeholder ECHO_INSTALLER_VERSION in scripts/install.sh
        # to the concrete tag. The scripts/install.test.sh smoke test asserts
        # this line's format, so changes here must stay compatible.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          sed -i "s|^ECHO_INSTALLER_VERSION=.*|ECHO_INSTALLER_VERSION=\"${TAG}\"|" scripts/install.sh
          grep '^ECHO_INSTALLER_VERSION=' scripts/install.sh
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          IMAGE: ${{ needs.docker.outputs.image }}
          DIGEST: ${{ needs.docker.outputs.digest }}
        run: |
          VERSION="${TAG#v}"
          PRERELEASE_FLAG=""
          if echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+-.+'; then
            PRERELEASE_FLAG="--prerelease"
          fi
          NOTES_FILE=$(mktemp)
          cat > "$NOTES_FILE" <<EOF
          ## Install with one command

          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${TAG}/install.sh | sudo bash
          \`\`\`

          The installer pulls this release's image, generates secrets,
          walks you through the \`.env\` interactively, and installs the
          \`emcp\` CLI at \`/usr/local/bin/emcp\` for day-2 ops (\`emcp up\`,
          \`emcp logs\`, \`emcp key create --name "..."\`, etc.).

          See [README.md](https://github.com/${{ github.repository }}/blob/${TAG}/README.md#quick-install) for details.

          ## Container image

          \`\`\`
          docker pull ${IMAGE}:${VERSION}
          \`\`\`

          Pinned by digest:

          \`\`\`
          ${IMAGE}@${DIGEST}
          \`\`\`
          EOF
          gh release create "$TAG" \
            --title "Echo $TAG" \
            --notes-file "$NOTES_FILE" \
            --generate-notes \
            $PRERELEASE_FLAG
      - name: Attach installer + CLI as release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$TAG" scripts/install.sh scripts/emcp --clobber
