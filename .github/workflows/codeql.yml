name: CodeQL

# CodeQL scanning requires GitHub Advanced Security on private repos.
# The job is gated on repository visibility so it auto-activates once the
# repo becomes public (or GHAS is enabled). Remove the gate and add the
# `schedule:` trigger below once CodeQL is available.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Uncomment once CodeQL is unlocked (public repo or GHAS enabled):
  # schedule:
  #   - cron: '31 6 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  analyze:
    if: github.event.repository.visibility == 'public'
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3
        with:
          category: '/language:javascript-typescript'
