name: CodeQL

# CodeQL scanning requires GitHub Advanced Security on private repos.
# The job is gated on repository visibility so it auto-activates once the
# repo becomes public (or GHAS is enabled). Remove the gate and add the
# `schedule:` trigger below once CodeQL is available.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Uncomment once CodeQL is unlocked (public repo or GHAS enabled):
  # schedule:
  #   - cron: '31 6 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  analyze:
    if: github.event.repository.visibility == 'public'
    name: Analyze JavaScript/TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Initialize CodeQL
        uses: github/codeql-action/init@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          category: '/language:javascript-typescript'
