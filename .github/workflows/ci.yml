name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Run JavaScript actions (checkout, setup-node, upload-artifact, ...) on
  # Node.js 24 instead of the deprecated Node.js 20. GitHub will force this
  # default in June 2026; opting in now matches our runtime pin.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Minimal default scope. Jobs add what they need.
permissions:
  contents: read

# Cancel stale in-flight runs for the same PR; never cancel on main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scripts:
    # Static checks for scripts/install.sh and scripts/emcp. Fast (<30s),
    # runs in parallel with `ci` so shell issues surface without waiting on
    # the full test suite. shellcheck + bash -n are pre-installed on
    # ubuntu-latest.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: shellcheck
        run: shellcheck -S warning scripts/install.sh scripts/emcp scripts/install.test.sh
      - name: bash -n + smoke tests
        run: bash scripts/install.test.sh

  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: mcp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mcp"
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Verify package signatures
        run: npm audit signatures
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Migrations reversibility test
        env:
          NODE_ENV: test
          EMCP_PORT: '3000'
          EMCP_PUBLIC_HOST: localhost
          EMCP_ALLOWED_ORIGINS: http://localhost
          EMCP_DATABASE_URL: postgres://mcp:mcp@localhost:5432/mcp_test
          EMCP_REDIS_URL: redis://localhost:6379
          EMCP_API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
        run: |
          node src/db/migrate.ts up
          node src/db/migrate.ts down
          node src/db/migrate.ts up
          node src/db/migrate.ts status
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  integration:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          EMCP_PORT: '0'
          EMCP_PUBLIC_HOST: localhost
          EMCP_ALLOWED_ORIGINS: http://localhost
          EMCP_API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
          EMCP_DATABASE_URL: postgres://placeholder/placeholder
          EMCP_REDIS_URL: redis://placeholder

  ci-rootless:
    # OWASP Docker Cheat Sheet #11 — end-to-end validation that the v2
    # installer + compose stack work against a rootless daemon with zero
    # `sudo` invocations. Rootless Docker is not the runner's default
    # daemon, so we bring up a user-owned one before running the e2e.
    #
    # Flakiness note: this job depends on `dockerd-rootless-setuptool.sh`
    # behaving on the GHA runner kernel. If it becomes unreliable, the
    # fallback is a rootless-DinD sidecar — see the branch preserved in
    # docs/ARCHITECTURE.md.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: ci
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install rootless-Docker prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            uidmap slirp4netns dbus-user-session fuse-overlayfs
          # Ubuntu 24.04 defaults kernel.apparmor_restrict_unprivileged_userns=1,
          # which blocks rootlesskit's fork/exec of /proc/self/exe. The
          # Ubuntu-recommended fix is a per-binary AppArmor profile; on
          # an ephemeral CI runner the sysctl disable is simpler and
          # scoped to this job's VM (see upstream rootlesskit docs).
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
      - name: Stop the runner's rootful daemon
        run: |
          # GHA's rootful docker.service holds /var/run/docker.sock; we
          # need the rootless daemon to own the DOCKER_HOST we export
          # below so testcontainers + install.sh target the right one.
          sudo systemctl disable --now docker.service docker.socket || true
          sudo rm -f /var/run/docker.sock
      - name: Set up rootless Docker as the runner user
        # GHA's ubuntu-latest ships docker.io, which doesn't include
        # dockerd-rootless-setuptool.sh. The upstream installer at
        # get.docker.com/rootless drops static binaries + the setup
        # script under $HOME/bin, then runs the setup itself — no
        # system package dependency.
        run: |
          curl -fsSL https://get.docker.com/rootless | sh
          echo "$HOME/bin" >> "$GITHUB_PATH"
          # Linger so the user-level systemd unit survives the shell exit.
          sudo loginctl enable-linger "$(id -un)"
          # Export DOCKER_HOST + PATH so subsequent steps hit the
          # rootless socket. The get.docker.com installer already
          # launches `systemctl --user start docker` at tail; we still
          # `enable` it here so the unit sticks across reboots-in-runner
          # (rare but observed on self-hosted).
          XDG_RT="${XDG_RUNTIME_DIR:-/run/user/$(id -u)}"
          "$HOME/bin/systemctl" --user enable docker 2>/dev/null \
            || systemctl --user enable docker 2>/dev/null || true
          echo "DOCKER_HOST=unix://${XDG_RT}/docker.sock" >> "$GITHUB_ENV"
      - name: Confirm rootless daemon is active
        run: |
          docker info --format '{{.SecurityOptions}}' | grep -q rootless \
            || { echo "daemon is not rootless"; exit 1; }
          docker info --format 'Rootless: ok ({{.ServerVersion}} at {{.Name}})'
      - name: Run e2e rootless install test
        run: bash tests/e2e/install-rootless.test.sh
      - name: Capture install log on failure
        if: failure()
        run: |
          find "$HOME/.local/share/emcp/bin" -name 'install-*.log' -exec cat {} + 2>/dev/null || true
          find "$HOME" -name 'install-*.log' -exec cat {} + 2>/dev/null || true

  image-scan:
    # OWASP Docker Cheat Sheet #9 — scan the built runtime image for
    # CVEs before the PR lands. Fails the build on CRITICAL or HIGH
    # severity unfixed vulnerabilities. `.trivyignore` (checked in) is
    # the operator-reviewed allowlist for accepted exceptions.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Build runtime image
        run: docker build -t emcp:ci .
      - name: Trivy CVE scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: emcp:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore

  dep-review:
    # Dependency Review requires GitHub Advanced Security on private repos.
    # Auto-activates when the repo becomes public (or GHAS is enabled).
    if: >-
      github.event_name == 'pull_request' &&
      github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
