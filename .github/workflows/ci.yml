name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Run JavaScript actions (checkout, setup-node, upload-artifact, ...) on
  # Node.js 24 instead of the deprecated Node.js 20. GitHub will force this
  # default in June 2026; opting in now matches our runtime pin.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# Minimal default scope. Jobs add what they need.
permissions:
  contents: read

# Cancel stale in-flight runs for the same PR; never cancel on main.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  scripts:
    # Static checks for scripts/install.sh and scripts/emcp. Fast (<30s),
    # runs in parallel with `ci` so shell issues surface without waiting on
    # the full test suite. shellcheck + bash -n are pre-installed on
    # ubuntu-latest.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: shellcheck
        run: shellcheck -S warning scripts/install.sh scripts/emcp scripts/install.test.sh
      - name: bash -n + smoke tests
        run: bash scripts/install.test.sh

  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: mcp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mcp"
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
      - name: Verify package signatures
        run: npm audit signatures
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Migrations reversibility test
        env:
          NODE_ENV: test
          EMCP_PORT: '3000'
          EMCP_PUBLIC_HOST: localhost
          EMCP_ALLOWED_ORIGINS: http://localhost
          EMCP_DATABASE_URL: postgres://mcp:mcp@localhost:5432/mcp_test
          EMCP_REDIS_URL: redis://localhost:6379
          EMCP_API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
        run: |
          node src/db/migrate.ts up
          node src/db/migrate.ts down
          node src/db/migrate.ts up
          node src/db/migrate.ts status
      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  integration:
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          EMCP_PORT: '0'
          EMCP_PUBLIC_HOST: localhost
          EMCP_ALLOWED_ORIGINS: http://localhost
          EMCP_API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
          EMCP_DATABASE_URL: postgres://placeholder/placeholder
          EMCP_REDIS_URL: redis://placeholder

  dep-review:
    # Dependency Review requires GitHub Advanced Security on private repos.
    # Auto-activates when the repo becomes public (or GHAS is enabled).
    if: >-
      github.event_name == 'pull_request' &&
      github.event.repository.visibility == 'public'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
