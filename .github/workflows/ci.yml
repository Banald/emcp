name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp
          POSTGRES_DB: mcp_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U mcp"
          --health-interval 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Migrations reversibility test
        env:
          NODE_ENV: test
          PORT: '3000'
          PUBLIC_HOST: localhost
          ALLOWED_ORIGINS: http://localhost
          DATABASE_URL: postgres://mcp:mcp@localhost:5432/mcp_test
          REDIS_URL: redis://localhost:6379
          API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
        run: |
          node src/db/migrate.ts up
          node src/db/migrate.ts down
          node src/db/migrate.ts up
          node src/db/migrate.ts status
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  integration:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
      - run: npm ci
      - name: Integration tests
        run: npm run test:integration
        env:
          NODE_ENV: test
          PORT: '0'
          PUBLIC_HOST: localhost
          ALLOWED_ORIGINS: http://localhost
          API_KEY_HMAC_SECRET: dGVzdC1wZXBwZXItYXQtbGVhc3QtMzItYnl0ZXMtbG9uZw==
          DATABASE_URL: postgres://placeholder/placeholder
          REDIS_URL: redis://placeholder
