name: PR title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2
        with:
          egress-policy: audit
      - name: Validate title against AGENTS.md commit types
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Allowed types mirror AGENTS.md ("Commit conventions" section).
          types: |
            feat
            fix
            chore
            docs
            test
            refactor
            ci
          requireScope: false
          subjectPattern: ^[a-z0-9].+$
          subjectPatternError: |
            The subject "{subject}" doesn't match the required pattern.
            Start with a lowercase letter or digit — e.g. "feat(auth): add HMAC key hashing".
